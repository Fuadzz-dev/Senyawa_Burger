<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasir - Antrian</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            min-height: 100vh;
            background-color: #ffffff;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background-color: #de882b; /* Orange exactly from image */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
            flex-shrink: 0;
        }

        .avatar {
            width: 120px;
            height: 120px;
            background-color: #171717;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            overflow: hidden;
            position: relative;
        }

        .avatar-head {
            width: 45px;
            height: 45px;
            background-color: #de882b;
            border-radius: 50%;
            position: absolute;
            top: 20px;
        }

        .avatar-body {
            width: 90px;
            height: 50px;
            background-color: #de882b;
            border-top-left-radius: 45px;
            border-top-right-radius: 45px;
            position: absolute;
            bottom: -10px;
        }

        .user-name {
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .user-id {
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 50px;
            letter-spacing: 1px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
        }

        .nav-icon {
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logout-wrapper {
            margin-top: auto;
            margin-bottom: 50px;
        }

        .btn-logout {
            background-color: #e63e48;
            color: #111;
            border: none;
            border-radius: 12px;
            padding: 8px 18px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
        }

        /* MAIN SECTION */
        .main {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        .title-box {
            border: 1px solid #d48328;
            background-color: #fcebd9;
            padding: 8px 15px;
            margin-bottom: 20px;
        }

        .title-text {
            color: #555555;
            font-size: 34px;
            font-weight: normal;
        }

        .content-card {
            border: 1px solid #d48328;
            margin-bottom: 25px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-header {
            padding: 15px 20px;
            font-weight: bold;
            font-size: 16px;
            border-bottom: 1px solid #e2e2e2;
            color: #000;
        }

        .order-table {
            width: 100%;
            border-collapse: collapse;
            flex: 1;
            table-layout: fixed;
        }

        .order-table th {
            padding: 15px;
            font-size: 11px;
            color: #444;
            border-bottom: 1px solid #e2e2e2;
            border-right: 1px solid #e2e2e2;
            text-align: center;
        }
        .order-table th:last-child {
            border-right: none;
        }

        .order-table td {
            vertical-align: top;
            border-right: 1px solid #e2e2e2;
            padding: 25px 20px;
            height: 350px;
        }
        .order-table td:last-child {
            border-right: none;
        }

        .col-nama {
            width: 40%;
        }
        .col-jumlah {
            width: 30%;
        }
        .col-total {
            width: 30%;
        }

        .item-name {
            color: #888;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 25px;
            text-align: center;
        }

        .catatan-label {
            font-size: 10px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #000;
            margin-top: 15px;
            margin-left: 5px;
        }

        .catatan-input {
            width: 100%;
            max-width: 250px;
            border: 1px solid #b3b3b3;
            border-radius: 8px;
            height: 45px;
            padding: 5px 10px;
            outline: none;
        }

        .item-value {
            color: #888;
            font-size: 12px;
            margin-top: 55px;
            text-align: center;
        }

        /* BOTTOM AREA */
        .bottom-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
            padding: 0 5px;
        }

        .bottom-left {
            width: 55%;
        }

        .catatan-lainnya-label {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 8px;
            display: block;
            color: #000;
        }

        .catatan-lainnya-textarea {
            width: 100%;
            height: 70px;
            border: 1px solid #b3b3b3;
            border-radius: 8px;
            resize: none;
            padding: 10px;
            outline: none;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }

        .bottom-right {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        .total-label {
            font-weight: bold;
            font-size: 14px;
            color: #000;
        }

        .total-price {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 15px;
            color: #000;
        }

        .btn-konfirmasi-lunas {
            background-color: #e0e0e0;
            color: #000;
            border: none;
            padding: 12px 18px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-selesai {
            background-color: #6ed02c;
            color: white;
            border: none;
            padding: 16px 20px;
            width: 380px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            margin: 0 auto;
            display: block;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="avatar">
            <div class="avatar-head"></div>
            <div class="avatar-body"></div>
        </div>
        <div class="user-name">Name</div>
        <div class="user-id">(16284261)</div>
        <a href="#" class="nav-link">
            <span class="nav-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="8" y1="6" x2="21" y2="6"></line>
                    <line x1="8" y1="12" x2="21" y2="12"></line>
                    <line x1="8" y1="18" x2="21" y2="18"></line>
                    <line x1="3" y1="6" x2="3.01" y2="6"></line>
                    <line x1="3" y1="12" x2="3.01" y2="12"></line>
                    <line x1="3" y1="18" x2="3.01" y2="18"></line>
                </svg>
            </span>
            Daftar Antrian
        </a>
        <div class="logout-wrapper">
            <button class="btn-logout">Logout</button>
        </div>
    </div>

    <div class="main">
        <div class="title-box">
            <h1 class="title-text">DETAIL PESANAN</h1>
        </div>

        <div class="content-card">
            <div class="card-header">
                DAFTAR DETAIL PESANAN
            </div>
            <table class="order-table">
                <thead>
                    <tr>
                        <th class="col-nama">NAMA MENU</th>
                        <th class="col-jumlah">JUMLAH</th>
                        <th class="col-total">TOTAL PEMBAYARAN</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>
                            <div class="item-name">CHEESE BURGER</div>
                            <div class="catatan-label">Catatan</div>
                            <input type="text" class="catatan-input">
                        </td>
                        <td>
                            <div class="item-value">10</div>
                        </td>
                        <td>
                            <div class="item-value">24.000.000</div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="bottom-section">
            <div class="bottom-left">
                <label class="catatan-lainnya-label">Catatan Lainnya</label>
                <textarea class="catatan-lainnya-textarea"></textarea>
            </div>
            <div class="bottom-right">
                <div class="total-label">TOTAL</div>
                <div class="total-price">Rp24.000.000</div>
                <button class="btn-konfirmasi-lunas">KONFIRMASI LUNAS</button>
            </div>
        </div>

        <button class="btn-selesai">KONFIRMASI PESANAN SELESAI</button>
    </div>
</body>
</html>
