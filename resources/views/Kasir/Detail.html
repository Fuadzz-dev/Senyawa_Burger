<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Detail Pesanan – Kasir</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --orange: #e8500a;
                --orange-bg: #ff6b2b;
                --orange-light: #ff6b2b;
                --green: #4caf50;
                --green-dark: #3d8b40;
                --red: #e85555;
                --red-dark: #c83c3c;
                --surface: #ffffff;
                --border: #eeeeee;
                --text-dark: #1a1008;
                --text-muted: #888888;
                --radius: 16px;
                --pill: 100px;
                --cream: #faefe2;
                --dark: #1a1008;
                --card-bg: #ffffff;
                --text: #1a1008;
                --gray: #888;
            }

            body {
                font-family: "Nunito", sans-serif;
                background: var(--cream);
                color: var(--text);
                min-height: 100vh;
                display: flex;
            }

            /* ══ SIDEBAR ══ */
            .sidebar {
                width: 240px;
                min-height: 100vh;
                background: var(--orange-bg);
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 36px 20px 28px;
                flex-shrink: 0;
            }

            .avatar {
                width: 96px;
                height: 96px;
                border-radius: 50%;
                background: rgba(0, 0, 0, 0.22);
                display: flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 14px;
            }
            .avatar svg {
                width: 58px;
                height: 58px;
                fill: rgba(0, 0, 0, 0.55);
            }

            .sidebar-name {
                font-family: "Nunito", sans-serif;
                font-size: 17px;
                font-weight: 700;
                color: #fff;
                text-align: center;
                letter-spacing: normal;
                margin-bottom: 0;
                line-height: inherit;
            }
            .sidebar-id {
                font-size: 13.5px;
                font-weight: 600;
                color: rgba(255, 255, 255, 0.85);
                margin-top: 4px;
                margin-bottom: 28px;
                letter-spacing: 0.5px;
            }

            .nav-item {
                display: flex;
                align-items: center;
                gap: 10px;
                width: 100%;
                padding: 11px 14px;
                border-radius: var(--radius);
                cursor: pointer;
                font-size: 15px;
                font-weight: 700;
                color: #fff;
                text-decoration: none;
                transition: background 0.2s;
            }
            .nav-item:hover {
                background: rgba(0, 0, 0, 0.12);
                color: #fff;
            }
            .nav-item.active {
                background: rgba(0, 0, 0, 0.18);
                color: #fff;
            }
            .nav-item svg {
                width: 18px;
                height: 18px;
                stroke: #fff;
                stroke-width: 2;
                fill: none;
                flex-shrink: 0;
            }

            .sidebar-footer {
                margin-top: auto;
            }

            .btn-logout {
                background: var(--red);
                color: #fff;
                border: none;
                border-radius: 20px;
                padding: 9px 24px;
                font-family: "Nunito", sans-serif;
                font-size: 14px;
                font-weight: 700;
                cursor: pointer;
                transition:
                    background 0.2s,
                    transform 0.15s;
            }
            .btn-logout:hover {
                background: var(--red-dark);
                box-shadow: 0 4px 12px rgba(232, 85, 85, 0.3);
                transform: translateY(-2px);
            }
            .btn-logout:active {
                transform: scale(0.96);
            }

            /* ══ MAIN ══ */
            .main {
                flex: 1;
                padding: 32px 36px 40px;
                overflow-y: auto;
            }

            /* Page Title */
            .page-title {
                font-family: "Bebas Neue", cursive;
                font-size: 42px;
                font-weight: 400;
                color: var(--text-dark);
                letter-spacing: 2px;
                text-transform: uppercase;
                padding-bottom: 10px;
                border-bottom: 2px solid var(--orange);
                margin-bottom: 28px;
            }

            /* ══ ORDER TABLE CARD ══ */
            .order-card {
                background: var(--surface);
                border: 2px solid var(--border);
                border-radius: var(--radius);
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
                overflow: hidden;
                margin-bottom: 24px;
            }

            .order-card-header {
                padding: 15px 20px;
                font-family: "Nunito", sans-serif;
                font-size: 15px;
                font-weight: 800;
                color: var(--text-dark);
                text-transform: uppercase;
                letter-spacing: 0.5px;
                border-bottom: 1.5px solid var(--border);
                background: var(--surface);
            }

            /* Table */
            .order-table {
                width: 100%;
                border-collapse: collapse;
            }

            .order-table thead tr th {
                padding: 12px 20px;
                font-family: "Nunito", sans-serif;
                font-size: 11.5px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.8px;
                color: var(--text-muted);
                border-bottom: 1.5px solid var(--border);
                text-align: left;
                background: #fafaf8;
            }

            .order-table thead tr th:not(:first-child) {
                text-align: center;
            }

            .order-table tbody tr {
                transition: background 0.15s;
            }
            .order-table tbody tr:hover {
                background: #f5f2ee;
            }

            .order-table tbody tr td {
                padding: 16px 20px;
                font-family: "Nunito", sans-serif;
                font-size: 14px;
                font-weight: 600;
                color: var(--text-dark);
                border-bottom: 1px solid var(--border);
                vertical-align: top;
            }

            .order-table tbody tr:last-child td {
                border-bottom: none;
            }

            .order-table tbody tr td:not(:first-child) {
                text-align: center;
                color: var(--text-muted);
                font-size: 14px;
            }

            .item-name {
                font-family: "Bebas Neue", cursive;
                font-size: 1.2rem;
                color: var(--dark);
                letter-spacing: 1px;
                margin-bottom: 10px;
            }

            .note-label {
                font-size: 0.8rem;
                font-weight: 700;
                color: var(--gray);
                margin-bottom: 6px;
            }

            .note-input {
                width: 100%;
                max-width: 260px;
                border: 1.5px solid var(--border);
                border-radius: var(--radius);
                padding: 9px 12px;
                font-family: "Nunito", sans-serif;
                font-size: 13.5px;
                color: var(--text-dark);
                background: transparent;
                resize: none;
                outline: none;
                transition: border-color 0.2s;
            }
            .note-input:focus {
                border-color: var(--orange);
            }

            .qty-cell {
                font-size: 1.4rem;
                font-weight: 800;
                color: var(--dark);
            }

            .total-cell {
                font-size: 1.1rem;
                font-weight: 700;
                color: var(--dark);
            }

            /* Empty row */
            .empty-row td {
                height: 280px;
            }

            /* ══ BOTTOM AREA ══ */
            .bottom-area {
                display: flex;
                align-items: flex-start;
                gap: 24px;
            }

            .notes-block {
                flex: 1;
            }

            .notes-block label {
                font-size: 0.9rem;
                font-weight: 700;
                color: var(--dark);
                display: block;
                margin-bottom: 8px;
            }

            .notes-block textarea {
                width: 100%;
                height: 100px;
                border: 1.5px solid var(--border);
                border-radius: var(--radius);
                padding: 9px 12px;
                font-family: "Nunito", sans-serif;
                font-size: 13.5px;
                color: var(--text-dark);
                background: #fff;
                resize: none;
                outline: none;
                transition: border-color 0.2s;
            }
            .notes-block textarea:focus {
                border-color: var(--orange);
            }

            /* Total + Konfirmasi block */
            .total-block {
                flex-shrink: 0;
                text-align: right;
                min-width: 200px;
            }

            .total-label {
                font-size: 0.85rem;
                font-weight: 700;
                color: var(--gray);
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            .total-amount {
                font-size: 1.8rem;
                font-weight: 800;
                color: var(--dark);
                margin-bottom: 14px;
                margin-top: 2px;
            }

            .btn-konfirmasi-lunas {
                background: #ff4d00;
                color: var(--card-bg);
                border: none;
                border-radius: 50px;
                padding: 12px 20px;
                font-family: "Nunito", sans-serif;
                font-size: 0.9rem;
                font-weight: 700;
                cursor: pointer;
                transition:
                    transform 0.15s,
                    background 0.2s;
                width: 100%;
            }
            .btn-konfirmasi-lunas:hover {
                background: #8d2b02;
                transform: translateY(-2px);
                box-shadow: 0 8px 28px rgba(232, 80, 10, 0.5);
            }
            .btn-konfirmasi-lunas.paid {
                background: rgba(60, 184, 120, 0.1);
                color: var(--green);
                border: 2px solid var(--green);
            }

            /* ══ BIG GREEN BUTTON ══ */
            .btn-selesai {
                display: block;
                width: 100%;
                max-width: 600px;
                margin: 28px auto 0;
                padding: 16px;
                background: var(--orange);
                color: #fff;
                border: none;
                border-radius: 50px;
                font-family: "Nunito", sans-serif;
                font-size: 1rem;
                font-weight: 700;
                cursor: pointer;
                box-shadow: 0 6px 30px rgba(232, 80, 10, 0.4);
                transition:
                    transform 0.15s,
                    box-shadow 0.15s,
                    background 0.2s;
            }
            .btn-selesai:hover {
                background: var(--orange-light);
                transform: translateY(-2px);
                box-shadow: 0 8px 28px rgba(232, 80, 10, 0.5);
            }
            .btn-selesai:active {
                transform: scale(0.98);
            }

            /* ══ MODAL ══ */
            .modal-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.45);
                z-index: 200;
                align-items: center;
                justify-content: center;
            }
            .modal-overlay.open {
                display: flex;
                animation: mfade 0.2s ease;
            }
            @keyframes mfade {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }

            .modal {
                background: #fff;
                border-radius: 18px;
                padding: 28px 28px 24px;
                max-width: 480px;
                width: 92%;
                text-align: center;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
                animation: mslide 0.25s cubic-bezier(0.22, 1, 0.36, 1);
            }
            @keyframes mslide {
                from {
                    transform: scale(0.92);
                    opacity: 0;
                }
                to {
                    transform: scale(1);
                    opacity: 1;
                }
            }

            .modal-icon {
                font-size: 54px;
                margin-bottom: 16px;
            }
            .modal-title {
                font-family: "Bebas Neue", cursive;
                font-size: 1.6rem;
                color: var(--dark);
                margin-bottom: 8px;
                letter-spacing: 1px;
            }
            .modal-body {
                font-size: 0.95rem;
                color: var(--gray);
                margin-bottom: 24px;
                line-height: 1.5;
                font-weight: 600;
            }

            .modal-actions {
                display: flex;
                gap: 12px;
            }
            .modal-btn {
                flex: 1;
                padding: 12px;
                border: none;
                border-radius: 50px;
                font-family: "Nunito", sans-serif;
                font-size: 0.95rem;
                font-weight: 700;
                cursor: pointer;
                transition:
                    transform 0.15s,
                    background 0.2s;
            }
            .modal-btn.cancel {
                background: #eee;
                color: var(--dark);
            }
            .modal-btn.cancel:hover {
                background: #e0e0e0;
                transform: translateY(-1px);
            }
            .modal-btn.confirm {
                background: var(--orange);
                color: #fff;
                box-shadow: 0 4px 12px rgba(232, 80, 10, 0.3);
            }
            .modal-btn.confirm:hover {
                background: var(--orange-light);
                transform: translateY(-1px);
            }
            .modal-btn:active {
                transform: scale(0.97);
            }

            /* ══ TOAST ══ */
            .toast {
                position: fixed;
                top: 16px;
                left: 50%;
                transform: translateX(-50%) translateY(-80px);
                background: var(--dark);
                color: #fff;
                padding: 10px 22px;
                border-radius: 30px;
                font-size: 0.88rem;
                font-weight: 600;
                transition: transform 0.35s cubic-bezier(0.77, 0, 0.18, 1);
                z-index: 999;
                white-space: nowrap;
            }
            .toast.show {
                transform: translateX(-50%) translateY(0);
            }
        </style>
    </head>
    <body>
        <!-- ═══ SIDEBAR ═══ -->
        <aside class="sidebar">
            <div class="avatar">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"
                    />
                </svg>
            </div>

            <p class="sidebar-name" id="sidebarName">Name</p>
            <p class="sidebar-id" id="sidebarId">(16284261)</p>

            <a class="nav-item active" href="#" onclick="return false;">
                <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                >
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <line x1="3" y1="12" x2="21" y2="12" />
                    <line x1="3" y1="18" x2="21" y2="18" />
                </svg>
                Daftar Antrian
            </a>

            <div class="sidebar-footer">
                <button class="btn-logout" onclick="confirmLogout()">
                    Logout
                </button>
            </div>
        </aside>

        <!-- ═══ MAIN ═══ -->
        <main class="main">
            <h1 class="page-title">Detail Pesanan</h1>

            <!-- Order Table Card -->
            <div class="order-card">
                <div class="order-card-header">Daftar Detail Pesanan</div>
                <table class="order-table">
                    <thead>
                        <tr>
                            <th>Nama Menu</th>
                            <th>Jumlah</th>
                            <th>Total Pembayaran</th>
                        </tr>
                    </thead>
                    <tbody id="orderTableBody">
                        <!-- filled by JS -->
                    </tbody>
                </table>
            </div>

            <!-- Bottom Area -->
            <div class="bottom-area">
                <div class="notes-block">
                    <label>Catatan Lainnya</label>
                    <textarea
                        id="catatanLainnya"
                        placeholder="Tambahkan catatan untuk pesanan ini…"
                    ></textarea>
                </div>

                <div class="total-block">
                    <div class="total-label">Total</div>
                    <div class="total-amount" id="grandTotal">Rp24.000.000</div>
                    <button
                        class="btn-konfirmasi-lunas"
                        id="btnLunas"
                        onclick="toggleLunas()"
                    >
                        Konfirmasi Lunas
                    </button>
                </div>
            </div>

            <!-- Big Confirm Button -->
            <button class="btn-selesai" onclick="confirmSelesai()">
                Konfirmasi Pesanan Selesai
            </button>
        </main>

        <!-- ═══ CONFIRM MODAL ═══ -->
        <div class="modal-overlay" id="modal">
            <div class="modal">
                <div class="modal-icon" id="modalIcon">✅</div>
                <p class="modal-title" id="modalTitle">Konfirmasi</p>
                <p class="modal-body" id="modalBody">Apakah Anda yakin?</p>
                <div class="modal-actions">
                    <button class="modal-btn cancel" onclick="closeModal()">
                        Batal
                    </button>
                    <button class="modal-btn confirm" id="modalConfirmBtn">
                        Ya, Lanjutkan
                    </button>
                </div>
            </div>
        </div>

        <!-- Toast -->
        <div class="toast" id="toast"></div>

        <script>
            /* ── Data ── */
            const orders = [
                { name: "CHEESE BURGER", qty: 10, price: 2400000, note: "" },
            ];

            let isPaid = false;
            let pendingAction = null;

            /* ── Helpers ── */
            function fmt(n) {
                return (
                    "Rp" +
                    n
                        .toLocaleString("id-ID")
                        .replace(/\./g, ".")
                        .replace(",", ".")
                );
            }

            function recalc() {
                const total = orders.reduce((s, o) => s + o.price * o.qty, 0);
                document.getElementById("grandTotal").textContent = fmt(total);
            }

            /* ── Render Table ── */
            function renderTable() {
                const tbody = document.getElementById("orderTableBody");
                tbody.innerHTML = "";

                orders.forEach((item, i) => {
                    const tr = document.createElement("tr");
                    tr.innerHTML = `
        <td>
          <div class="item-name">${item.name}</div>
          <div class="note-label">Catatan</div>
          <textarea class="note-input" placeholder="" onchange="orders[${i}].note=this.value">${item.note}</textarea>
        </td>
        <td><span class="qty-cell">${item.qty}</span></td>
        <td><span class="total-cell">${fmt(item.price * item.qty)}</span></td>
      `;
                    tbody.appendChild(tr);
                });

                // empty row for visual padding
                const emptyTr = document.createElement("tr");
                emptyTr.className = "empty-row";
                emptyTr.innerHTML = "<td></td><td></td><td></td>";
                tbody.appendChild(emptyTr);

                recalc();
            }

            /* ── Lunas Toggle ── */
            function toggleLunas() {
                if (isPaid) {
                    isPaid = false;
                    document
                        .getElementById("btnLunas")
                        .classList.remove("paid");
                    document.getElementById("btnLunas").textContent =
                        "Konfirmasi Lunas";
                    showToast("Status pembayaran dibatalkan");
                } else {
                    openModal(
                        "💰",
                        "Konfirmasi Lunas",
                        "Tandai pesanan ini sebagai sudah lunas dibayar?",
                        () => {
                            isPaid = true;
                            document
                                .getElementById("btnLunas")
                                .classList.add("paid");
                            document.getElementById("btnLunas").textContent =
                                "✓ Sudah Lunas";
                            showToast("Pembayaran dikonfirmasi lunas");
                        },
                    );
                }
            }

            /* ── Selesai ── */
            function confirmSelesai() {
                if (!isPaid) {
                    showToast("⚠️ Konfirmasi lunas terlebih dahulu");
                    return;
                }
                openModal(
                    "🎉",
                    "Pesanan Selesai",
                    "Konfirmasi bahwa pesanan ini telah selesai dan siap diserahkan?",
                    () =>
                        showToast("✅ Pesanan berhasil dikonfirmasi selesai!"),
                );
            }

            /* ── Logout ── */
            function confirmLogout() {
                openModal(
                    "👋",
                    "Logout",
                    "Apakah Anda yakin ingin keluar dari sistem?",
                    () => showToast("👋 Berhasil logout"),
                );
            }

            /* ── Modal ── */
            function openModal(icon, title, body, onConfirm) {
                document.getElementById("modalIcon").textContent = icon;
                document.getElementById("modalTitle").textContent = title;
                document.getElementById("modalBody").textContent = body;
                pendingAction = onConfirm;
                document.getElementById("modal").classList.add("open");
            }

            function closeModal() {
                document.getElementById("modal").classList.remove("open");
                pendingAction = null;
            }

            document.getElementById("modalConfirmBtn").onclick = () => {
                closeModal();
                if (pendingAction) pendingAction();
            };

            document.getElementById("modal").addEventListener("click", (e) => {
                if (e.target === document.getElementById("modal")) closeModal();
            });

            /* ── Toast ── */
            let toastTimer;
            function showToast(msg) {
                clearTimeout(toastTimer);
                const el = document.getElementById("toast");
                el.textContent = msg;
                el.classList.add("show");
                toastTimer = setTimeout(
                    () => el.classList.remove("show"),
                    2400,
                );
            }

            /* ── Init ── */
            renderTable();
        </script>
    </body>
</html>
